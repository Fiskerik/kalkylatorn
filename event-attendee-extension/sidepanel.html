<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prospect In</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
<main class="container">

  <!-- Header -->
  <header class="header">
    <div class="brand-row">
      <img src="assets/logo.png" class="brand-logo" alt="Prospect In" />
      <div>
        <h1>Prospect In</h1>
        <p id="statusText" class="status">Ready to extract.</p>
      </div>
    </div>
 
    <!-- Shown when signed OUT -->
    <div id="signedOutBadge" class="account-badge">
      <span class="account-email" style="color:var(--text-muted);font-weight:400;">Not signed in</span>
      <button id="signInHeaderBtn" class="btn-link" style="color:var(--blue);font-weight:600;">Sign in</button>
    </div>
 
    <!-- Shown when signed IN -->
    <div id="accountBadge" class="account-badge" hidden>
      <span id="accountEmail" class="account-email"></span>
      <span id="accountCredits" class="account-credits"></span>
      <button id="signOutBtn" class="btn-link">Sign out</button>
    </div>
  </header>

  <!-- Main actions -->
  <section class="actions">
    <button id="scrapeBtn" class="btn primary">Extract attendees</button>

    <div class="field-row">
      <label for="attendeeLimitInput" class="field-label">Max attendees per scrape</label>
      <input id="attendeeLimitInput" class="input" type="number" min="1" step="1" value="100" />
    </div>

    <div class="export-row">
      <select id="crmSelect" class="crm-select">
        <option value="generic">Generic CSV</option>
        <option value="hubspot">HubSpot</option>
        <option value="pipedrive">Pipedrive</option>
        <option value="salesforce">Salesforce</option>
        <option value="zoho">Zoho CRM</option>
      </select>
      <button id="csvBtn" class="btn export-btn">Export CSV</button>
    </div>

    <button id="saveJsonBtn" class="btn">Save as JSON file</button>
  </section>

  <!-- Attendee list -->
  <section class="results">
    <div class="results-header">
      <h2>Attendee List</h2>
      <div class="results-header-right">
        <div class="view-toggle">
          <button id="detailedViewBtn" class="view-btn active" type="button">List</button>
          <button id="cardViewBtn" class="view-btn" type="button">Cards</button>
        </div>
        <span id="countBadge" class="badge">0</span>
      </div>
    </div>
    <div id="attendeeList" class="attendee-list"></div>
  </section>

  <!-- History (signed-in only) -->
  <section id="historySection" class="results" hidden>
    <div class="results-header">
      <h2>Export History</h2>
    </div>
    <div id="historyList" class="history-list"></div>
  </section>

</main>

<!-- ── AUTH MODAL ── -->
<div id="authModal" class="modal-overlay" hidden>
  <div class="modal-card">
    <button id="closeAuthModal" class="modal-close">✕</button>
    <h2 class="modal-title">Sign in to Prospect In</h2>
    <p class="modal-sub">Sign in to unlock full exports.</p>

    <!-- Google Sign-In -->
    <button id="googleSignInBtn" class="btn google-btn full-width">
      <svg width="18" height="18" viewBox="0 0 48 48" style="margin-right:8px;flex-shrink:0">
        <path fill="#4285F4" d="M45.3 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h11.9c-.5 2.6-2 4.8-4.3 6.3v5.2h7c4.1-3.8 6.7-9.4 6.7-15.5z"/>
        <path fill="#34A853" d="M24 46c6 0 11-2 14.6-5.4l-7-5.2c-2 1.3-4.5 2.1-7.6 2.1-5.8 0-10.8-3.9-12.5-9.2H4.2v5.4C7.8 41.1 15.4 46 24 46z"/>
        <path fill="#FBBC04" d="M11.5 28.3c-.5-1.3-.7-2.7-.7-4.3s.3-3 .7-4.3v-5.4H4.2C2.8 17.1 2 20.4 2 24s.8 6.9 2.2 9.7l7.3-5.4z"/>
        <path fill="#EA4335" d="M24 9.5c3.2 0 6.1 1.1 8.4 3.3l6.3-6.3C34.9 3 29.9 1 24 1 15.4 1 7.8 5.9 4.2 13.3l7.3 5.4C13.2 13.4 18.2 9.5 24 9.5z"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or</span></div>

    <!-- Password form (default) -->
    <div id="passwordForm" style="display:flex;flex-direction:column;gap:8px;">
      <input id="authEmail" class="input" type="email" placeholder="Email" />
      <input id="authPassword" class="input" type="password" placeholder="Password" />
      <button id="signInBtn" class="btn primary full-width">Sign in</button>
      <button id="showMagicLinkBtn" class="btn-link" style="text-align:center;font-size:11.5px;">Sign in with magic link instead</button>
    </div>

    <!-- Magic link form (hidden by default) -->
    <div id="magicLinkForm" style="display:none;flex-direction:column;gap:8px;">
      <input id="magicLinkEmail" class="input" type="email" placeholder="Email" />
      <button id="magicLinkBtn" class="btn primary full-width">Send magic link</button>
      <button id="showPasswordBtn" class="btn-link" style="display:none;text-align:center;font-size:11.5px;">Sign in with password instead</button>
    </div>

    <p id="authError" class="auth-error" hidden></p>
    <a id="openWebAppLink" href="#" class="modal-link">Create account on web ↗</a>
  </div>
</div>

<!-- ── EXPORT MODAL ── -->
<div id="exportModal" class="modal-overlay" hidden>
  <div class="modal-card">
    <button id="closeExportModal" class="modal-close">✕</button>
    <h2 class="modal-title">Export options</h2>
    <p class="modal-sub" id="exportModalSub"></p>

    <div class="export-options">
      <button id="exportFreeBtn" class="export-option">
        <span class="export-option-title">Free — Top 20 entries</span>
        <span class="export-option-desc">No account needed</span>
        <span class="export-option-badge free">Free</span>
      </button>
      <button id="exportCreditBtn" class="export-option premium">
        <span class="export-option-title">Full report — all <span id="exportTotalCount"></span> entries</span>
        <span class="export-option-desc" id="exportCreditDesc"></span>
        <span class="export-option-badge premium">1 credit</span>
      </button>
    </div>

    <!-- Buy credits (shown when no credits) -->
    <div id="buyCreditsSection" class="buy-section" hidden>
      <p class="buy-title">Buy credits</p>
      <div class="pricing-grid">
        <button data-plan="single" class="pricing-btn">
          <strong>1 report</strong><span>$9.99</span>
        </button>
        <button data-plan="five" class="pricing-btn">
          <strong>5 reports</strong><span>$39.99</span>
        </button>
        <button data-plan="ten" class="pricing-btn">
          <strong>10 reports</strong><span>$69.99</span>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="crm-export.js"></script>
<script src="sidepanel.js"></script>
</body>
</html>
